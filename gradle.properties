# --- Plugin coordinates ---
pluginGroup = io.github.saschaweiss.cssglyphpreview
pluginVersion = 1.0.0

# --- Target platform ---
# IntelliJ IDEA Ultimate bundles the CSS/SCSS plugins we depend on.
# WebStorm/PhpStorm also work; for those swap the dependency in build.gradle.kts.
platformType = IU
platformVersion = 2025.1

# Compatibility range. Adjust untilBuild when you test newer IDEs.
pluginSinceBuild = 251
pluginUntilBuild = 261.*

# --- Build ---
kotlin.code.style = official
org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC
org.gradle.caching = true
org.gradle.configuration-cache = true
